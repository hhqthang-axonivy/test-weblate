name: i18n

on:
  push:
    branches:
      - master
  workflow_dispatch:
  schedule:
    - cron:  '21 21 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: POT Templates
      run: | 
        docker run -v .:/doc -u $(id -u) axonivy/build-container:read-the-docs-2 make \
          gettext BASEDIR=/doc GETTEXT_COMPACT=user-guide
    - name: Update PO Languages
      run: |
        docker run -v .:/doc -u $(id -u) axonivy/build-container:read-the-docs-2 make\
          generatePO BASEDIR=/doc LOCALEDIR=/doc/locale LANGUAGE=ja
    - name: Locale Diff
      id: locale-diff
      run: |
        echo "LOCALE_DIFF<<EOF" >> $GITHUB_ENV
        git --no-pager status -s locale/* >> $GITHUB_ENV
        echo "EOF" >> $GITHUB_ENV
    - name: Revert PO header
      if: ${{ env.LOCALE_DIFF != '' }}
      run: |
        for po in locale/*/LC_MESSAGES/*.po; do
          if git show HEAD:"$po" > /dev/null 2>&1; then
            old_header_end=$(git show HEAD:"$po" | grep -n '^$' | head -1 | cut -d: -f1)
            new_header_end=$(grep -n '^$' "$po" | head -1 | cut -d: -f1)
            git show HEAD:"$po" | head -$((old_header_end - 1)) > /tmp/old_header
            tail -n +$new_header_end "$po" > /tmp/body
            cat /tmp/old_header /tmp/body > "$po"
          fi
          sed -i -e :a -e '/^[[:space:]]*$/{$d;N;ba' -e '}' "$po"
        done
    - name: Create Pull Request
      if: ${{ env.LOCALE_DIFF != '' }}
      run: |
        echo "committing changes:\n ${{ env.LOCALE_DIFF }}"
        git config user.email "${{ github.actor }}@users.noreply.github.com"
        git config user.name "${{ github.actor }}"
        git checkout -b languages
        git add locale/*
        git commit -m "update PO language files"
        git push -u -f origin languages
        gh pr create --title "Language update :globe_with_meridians:"\
          --body "auto-updates language files"\
          --label "i18n"
      env:
        GH_TOKEN: ${{ github.token }}
